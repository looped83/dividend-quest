<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dividend Quest – Verwandle vermiedene Käufe in Dividendenkapital"
    />
    <title>Dividend Quest</title>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      body {
        background-color: #0f172a;
        color: #f8fafc;
        font-family: 'Segoe UI', system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      #loading-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: #10b981;
        letter-spacing: 0.04em;
      }
      #loading-bar-track {
        width: 220px;
        height: 6px;
        background: #1e293b;
        border-radius: 99px;
        overflow: hidden;
      }
      #loading-bar-fill {
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #10b981, #3b82f6);
        border-radius: 99px;
        animation: slide 1.4s ease-in-out infinite;
      }
      @keyframes slide {
        0%   { transform: translateX(-100%) scaleX(0.6); }
        50%  { transform: translateX(100%) scaleX(1.2); }
        100% { transform: translateX(250%) scaleX(0.6); }
      }
      #loading-sub {
        font-size: 0.8rem;
        color: #64748b;
      }
      #fatal-error {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        text-align: center;
        padding: 32px 16px;
        max-width: 480px;
      }
      #fatal-error h1 { color: #ef4444; font-size: 1.25rem; }
      #fatal-error p  { color: #94a3b8; font-size: 0.9rem; line-height: 1.6; }
      #fatal-error button {
        background: #10b981;
        color: #fff;
        border: none;
        padding: 10px 28px;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
    <script>
      function showFatalError(msg) {
        var loading = document.getElementById('loading');
        var fatal   = document.getElementById('fatal-error');
        var text    = document.getElementById('fatal-error-msg');
        if (loading) loading.style.display = 'none';
        if (fatal)   fatal.style.display = 'flex';
        if (text)    text.textContent = msg || 'Ein unbekannter Fehler ist aufgetreten.';
      }
      window.onerror = function(msg, src, line, col, err) {
        showFatalError((err && err.message) || msg);
      };
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason instanceof Error ? e.reason.message : String(e.reason || '');
        showFatalError(msg);
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div id="loading" aria-live="polite" aria-label="Dividend Quest wird geladen">
        <p id="loading-title">⚔️&nbsp;&nbsp;Dividend Quest</p>
        <div id="loading-bar-track" role="progressbar" aria-label="Ladefortschritt">
          <div id="loading-bar-fill"></div>
        </div>
        <p id="loading-sub">wird geladen…</p>
      </div>
      <div id="fatal-error" role="alert">
        <h1>Fehler beim Starten</h1>
        <p id="fatal-error-msg"></p>
        <button onclick="location.reload()">Seite neu laden</button>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
